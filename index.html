<!DOCTYPE html>
<html>
<head>
<title>My Sticker Collection</title>
<style>

body{
font-family:Arial;
background:#f4f6f8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.owned{
border:3px solid green;
}

.missing{
border:3px solid red;
}

</style>
</head>

<body>

<h1>My Sticker Collection</h1>

<div id="cards" class="grid"></div>

<script>

fetch("data/cards.json")
.then(res => res.json())
.then(data => {

let html="";

data.cards.forEach(card=>{

let statusClass = card.owned ? "owned" : "missing";

html += `
<div class="card ${statusClass}">
<img src="${card.image}">
<h3>${card.player}</h3>
<p>${card.team}</p>
<p>#${card.number}</p>
</div>
`;

});

document.getElementById("cards").innerHTML=html;

});

</script>

</body>
</html>
